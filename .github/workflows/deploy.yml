name: Deploy factor dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: factor-dashboard-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/home/ubuntu/factor-dashboard' }}
      SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
      SERVICE_NAME: ${{ secrets.SERVICE_NAME || 'factor-dashboard' }}
    steps:
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull latest code and restart service
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "set -euo pipefail \
            && cd '$DEPLOY_PATH' \
            && git fetch origin main \
            && git reset --hard origin/main \
            && python3 -m venv .venv \
            && . .venv/bin/activate \
            && pip install -r requirements.txt \
            && sudo systemctl restart '$SERVICE_NAME' \
            && sudo systemctl is-active --quiet '$SERVICE_NAME'"

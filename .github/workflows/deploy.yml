name: Deploy factor dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: factor-dashboard-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/home/ubuntu/factor-dashboard' }}
      SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
      SERVICE_NAME: ${{ secrets.SERVICE_NAME || 'factor-dashboard' }}
    steps:
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Debug SSH login
        shell: bash
        run: |
          set -euo pipefail
          echo "SERVER_USER=${{ secrets.SERVER_USER }}"
          echo "SERVER_HOST=${{ secrets.SERVER_HOST }}"
          echo "SERVER_PORT=$SERVER_PORT"
          echo "deploy key fingerprint:"
          ssh-keygen -y -f ~/.ssh/deploy_key | ssh-keygen -lf -
          ssh -vvv \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -i ~/.ssh/deploy_key \
            -p "$SERVER_PORT" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "whoami"

      - name: Pull latest code and restart service
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "DEPLOY_PATH='$DEPLOY_PATH' SERVICE_NAME='$SERVICE_NAME' REPO_SSH_URL='git@github.com:${{ github.repository }}.git' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          echo "== deploy path =="
          echo "$DEPLOY_PATH"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null || true

          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            echo "deploy path is not a git repository, cloning from $REPO_SSH_URL"
            mkdir -p "$(dirname "$DEPLOY_PATH")"
            git clone "$REPO_SSH_URL" "$DEPLOY_PATH"
          fi

          cd "$DEPLOY_PATH"

          echo "== git repository =="
          git rev-parse --is-inside-work-tree
          git remote -v
          git ls-remote --heads origin main
          git fetch origin main
          git reset --hard origin/main

          echo "== python environment =="
          python3 --version
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          echo "== restart service =="
          sudo -n systemctl restart "$SERVICE_NAME"
          sudo -n systemctl is-active --quiet "$SERVICE_NAME"
          sudo -n systemctl status "$SERVICE_NAME" --no-pager -l
          REMOTE_SCRIPT
